background {
    monitor =
    path = screenshot
    blur_size = 6
    blur_passes = 3
    noise = 0.0117
    contrast = 1.3
    brightness = 0.7
    vibrancy = 0.2
    vibrancy_darkness = 0.0
}

# Hours
label {
    monitor =
    text = cmd[update:1000] echo "<b><big> $(date +"%H") </big></b>"
    color = rgb(ff657a)
    font_size = 112
    font_family = FiraCode Nerd Font
    shadow_passes = 3
    shadow_size = 4

    position = 0, 220
    halign = center
    valign = center
}

# Minutes
label {
    monitor =
    text = cmd[update:1000] echo "<b><big> $(date +"%M") </big></b>"
    color = rgb(ff657a)
    font_size = 112
    font_family = FiraCode Nerd Font
    shadow_passes = 3
    shadow_size = 4

    position = 0, 80
    halign = center
    valign = center
}

# Day
label {
    monitor =
    text = cmd[update:18000000] echo "<b><big> $(date +'%A') </big></b>"
    color = rgb(eaf2f1)
    font_size = 22
    font_family = FiraCode Nerd Font

    position = 0, 30
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:18000000] echo "<b> $(date +'%d %b') </b>"
    color = rgb(eaf2f1)
    font_size = 18
    font_family = FiraCode Nerd Font

    position = 0, 6
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 250, 50
    outline_thickness = 2

    dots_size = 0.26
    dots_spacing = 0.64
    dots_center = true
    dots_rounding = -1

    rounding = 22
    outer_color = rgb(3a3d4b)
    inner_color = rgb(1e1f2b)
    font_color = rgb(eaf2f1)
    check_color = rgb(bad761)
    fail_color = rgb(ff657a)
    fade_on_empty = false
    placeholder_text = <i>Password...</i>
    fail_text = <i>Wrong password ($ATTEMPTS/10)</i>
    fail_timeout = 2000

    position = 0, 120
    halign = center
    valign = bottom
}

# Lockout countdown timer
label {
    monitor =
    text = cmd[update:1000] bash -c 'last=$(faillock --user $USER 2>/dev/null | tail -1 | awk "{print \$1, \$2}"); if [ -n "$last" ]; then count=$(faillock --user $USER 2>/dev/null | grep -c "Valid"); if [ "$count" -ge 10 ]; then last_epoch=$(date -d "$last" +%s 2>/dev/null); now=$(date +%s); elapsed=$((now - last_epoch)); remaining=$((600 - elapsed)); if [ "$remaining" -gt 0 ]; then min=$((remaining / 60)); sec=$((remaining % 60)); printf "⚠ Account locked — try again in %d:%02d" $min $sec; fi; fi; fi'
    color = rgb(ff9b5e)
    font_size = 14
    font_family = FiraCode Nerd Font

    position = 0, 80
    halign = center
    valign = bottom
}
